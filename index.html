<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a1625">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Compras">
<title>🛒 Minhas Compras</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #1a1625;
    --surface: #241e35;
    --surface2: #2e2845;
    --border: rgba(255,255,255,0.07);
    --text: #f0ecff;
    --muted: #8b85a8;
    --faint: #4a4468;
    --accent: #a78bfa;
    --accent-dim: rgba(167,139,250,0.15);

    --cat-frutas:    #4ade80; --cat-frutas-bg:    rgba(74,222,128,0.12);
    --cat-verduras:  #a3e635; --cat-verduras-bg:  rgba(163,230,53,0.12);
    --cat-carnes:    #f87171; --cat-carnes-bg:    rgba(248,113,113,0.12);
    --cat-laticinios:#60a5fa; --cat-laticinios-bg:rgba(96,165,250,0.12);
    --cat-mercearia: #f59e0b; --cat-mercearia-bg: rgba(245,158,11,0.12);
    --cat-limpeza:   #c084fc; --cat-limpeza-bg:   rgba(192,132,252,0.12);
    --cat-higiene:   #34d399; --cat-higiene-bg:   rgba(52,211,153,0.12);
    --cat-bebidas:   #fbbf24; --cat-bebidas-bg:   rgba(251,191,36,0.12);
    --cat-padaria:   #fb923c; --cat-padaria-bg:   rgba(251,146,60,0.12);
    --cat-outros:    #94a3b8; --cat-outros-bg:    rgba(148,163,184,0.12);
    --radius: 16px;
    --radius-sm: 10px;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    font-family: 'Nunito', sans-serif;
    color: var(--text);
    overflow: hidden;
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    max-width: 480px;
    margin: 0 auto;
    position: relative;
  }

  /* ── Header ── */
  .header {
    padding: 20px 20px 0;
    flex-shrink: 0;
  }
  .header-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 4px;
  }
  .header-title {
    font-size: 26px;
    font-weight: 900;
    letter-spacing: -0.5px;
    line-height: 1.1;
  }
  .header-title span { color: var(--accent); }
  .header-sub {
    font-size: 13px;
    color: var(--muted);
    font-weight: 600;
    margin-top: 2px;
  }
  .btn-clear {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 10px;
    color: var(--muted);
    font-size: 18px;
    cursor: pointer;
    transition: all .2s;
    line-height: 1;
  }
  .btn-clear:hover { color: #f87171; border-color: rgba(248,113,113,0.3); }

  /* ── Progress bar ── */
  .progress-wrap {
    margin: 14px 20px 0;
    flex-shrink: 0;
  }
  .progress-bar {
    height: 6px;
    background: var(--surface2);
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), #7c3aed);
    border-radius: 99px;
    transition: width .4s cubic-bezier(.4,0,.2,1);
    width: 0%;
  }

  /* ── Filtros ── */
  .filters {
    display: flex;
    gap: 8px;
    padding: 14px 20px 0;
    overflow-x: auto;
    flex-shrink: 0;
    scrollbar-width: none;
  }
  .filters::-webkit-scrollbar { display: none; }
  .chip {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 6px 12px;
    border-radius: 99px;
    border: 1.5px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-size: 12px;
    font-weight: 700;
    white-space: nowrap;
    cursor: pointer;
    transition: all .18s;
    flex-shrink: 0;
  }
  .chip .chip-icon { font-size: 13px; }
  .chip.active {
    background: var(--active-bg, var(--accent-dim));
    border-color: var(--active-color, var(--accent));
    color: var(--active-color, var(--accent));
  }

  /* ── Toggle ── */
  .toggle-row {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding: 10px 20px 4px;
    gap: 8px;
    flex-shrink: 0;
  }
  .toggle-label { font-size: 12px; color: var(--muted); font-weight: 600; }
  .toggle {
    width: 34px; height: 18px;
    background: var(--surface2);
    border-radius: 99px;
    cursor: pointer;
    position: relative;
    transition: background .2s;
    border: 1px solid var(--border);
  }
  .toggle.on { background: var(--accent); border-color: var(--accent); }
  .toggle::after {
    content: '';
    position: absolute;
    top: 2px; left: 2px;
    width: 12px; height: 12px;
    background: #fff;
    border-radius: 50%;
    transition: transform .2s;
  }
  .toggle.on::after { transform: translateX(16px); }

  /* ── Lista ── */
  .list-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 8px 16px 120px;
    scrollbar-width: none;
  }
  .list-scroll::-webkit-scrollbar { display: none; }

  .cat-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 14px 4px 8px;
  }
  .cat-icon-wrap {
    width: 26px; height: 26px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
  }
  .cat-name {
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    flex: 1;
  }
  .cat-badge {
    font-size: 10px;
    font-weight: 800;
    padding: 2px 7px;
    border-radius: 99px;
  }

  /* ── Item ── */
  .item {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 13px 14px;
    margin-bottom: 7px;
    cursor: pointer;
    transition: all .2s;
    position: relative;
    overflow: hidden;
    touch-action: pan-y;
    user-select: none;
  }
  .item.swiping { transition: none; }
  .item.checked {
    opacity: 0.5;
    background: var(--surface);
  }
  .item.checked .item-name {
    text-decoration: line-through;
    color: var(--muted);
  }
  .item:active { transform: scale(0.98); }

  .item-delete-bg {
    position: absolute;
    right: 0; top: 0; bottom: 0;
    width: 80px;
    background: rgba(248,113,113,0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    opacity: 0;
    transition: opacity .2s;
  }

  .checkbox {
    width: 22px; height: 22px;
    border-radius: 7px;
    border: 2px solid var(--faint);
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all .2s;
    font-size: 12px;
  }
  .item.checked .checkbox {
    border-color: transparent;
  }

  .item-body { flex: 1; min-width: 0; }
  .item-name {
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .item-qty {
    font-size: 11px;
    color: var(--muted);
    font-weight: 600;
    margin-top: 1px;
  }

  .item-cat-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* ── Empty state ── */
  .empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 10px;
    padding-bottom: 60px;
  }
  .empty-emoji { font-size: 56px; }
  .empty-title {
    font-size: 18px;
    font-weight: 800;
    color: var(--text);
  }
  .empty-sub { font-size: 13px; color: var(--muted); font-weight: 600; text-align: center; }

  /* ── FAB ── */
  .fab {
    position: absolute;
    bottom: 24px;
    right: 20px;
    width: 56px; height: 56px;
    background: var(--accent);
    border-radius: 18px;
    border: none;
    color: #fff;
    font-size: 26px;
    font-weight: 300;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 8px 24px rgba(167,139,250,0.35);
    transition: all .2s;
    z-index: 10;
  }
  .fab:active { transform: scale(0.92); box-shadow: 0 4px 12px rgba(167,139,250,0.2); }

  /* ── Bottom sheet ── */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity .25s;
    backdrop-filter: blur(2px);
  }
  .overlay.show { opacity: 1; pointer-events: all; }

  .sheet {
    position: fixed;
    bottom: 0; left: 50%; transform: translateX(-50%) translateY(100%);
    width: 100%; max-width: 480px;
    background: var(--surface);
    border-radius: 24px 24px 0 0;
    padding: 0 20px 0;
    z-index: 101;
    transition: transform .3s cubic-bezier(.4,0,.2,1);
    max-height: 92dvh;
    overflow-y: auto;
  }
  .sheet.show { transform: translateX(-50%) translateY(0); }

  .sheet-handle {
    width: 36px; height: 4px;
    background: var(--faint);
    border-radius: 99px;
    margin: 12px auto 20px;
  }
  .sheet-title {
    font-size: 20px;
    font-weight: 900;
    margin-bottom: 20px;
  }

  .field-label {
    font-size: 12px;
    font-weight: 800;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 7px;
  }

  .input {
    width: 100%;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 15px;
    font-weight: 600;
    outline: none;
    transition: border-color .2s;
    margin-bottom: 18px;
  }
  .input:focus { border-color: var(--accent); }
  .input::placeholder { color: var(--faint); }

  /* Quantidade */
  .qty-row {
    display: flex;
    align-items: center;
    gap: 0;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    overflow: hidden;
    margin-bottom: 18px;
  }
  .qty-btn {
    width: 44px; height: 44px;
    background: none;
    border: none;
    color: var(--accent);
    font-size: 22px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .15s;
    font-weight: 900;
  }
  .qty-btn:active { background: var(--accent-dim); }
  .qty-num {
    flex: 1;
    text-align: center;
    font-size: 16px;
    font-weight: 800;
    color: var(--text);
  }

  /* Grid de categorias */
  .cat-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 24px;
  }
  .cat-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    padding: 10px 6px;
    border-radius: var(--radius-sm);
    border: 1.5px solid var(--border);
    background: var(--bg);
    cursor: pointer;
    transition: all .18s;
  }
  .cat-btn.selected {
    border-color: var(--sel-color);
    background: var(--sel-bg);
  }
  .cat-btn-icon { font-size: 20px; }
  .cat-btn-label {
    font-size: 10px;
    font-weight: 800;
    color: var(--muted);
    text-align: center;
    line-height: 1.2;
  }
  .cat-btn.selected .cat-btn-label { color: var(--sel-color); }

  .btn-add {
    width: 100%;
    background: var(--accent);
    border: none;
    border-radius: var(--radius-sm);
    padding: 15px;
    color: #fff;
    font-family: 'Nunito', sans-serif;
    font-size: 16px;
    font-weight: 800;
    cursor: pointer;
    transition: all .2s;
    margin-bottom: 32px;
  }
  .btn-add:active { transform: scale(0.97); opacity: 0.9; }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 100px;
    left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 99px;
    padding: 10px 18px;
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
    z-index: 200;
    opacity: 0;
    transition: all .3s;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── Confirm dialog ── */
  .confirm {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 300;
    background: rgba(0,0,0,0.7);
    opacity: 0;
    pointer-events: none;
    transition: opacity .2s;
    padding: 20px;
  }
  .confirm.show { opacity: 1; pointer-events: all; }
  .confirm-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 24px;
    max-width: 320px;
    width: 100%;
    transform: scale(0.92);
    transition: transform .2s;
  }
  .confirm.show .confirm-box { transform: scale(1); }
  .confirm-title { font-size: 17px; font-weight: 900; margin-bottom: 8px; }
  .confirm-sub { font-size: 13px; color: var(--muted); font-weight: 600; margin-bottom: 20px; }
  .confirm-actions { display: flex; gap: 10px; }
  .btn-cancel {
    flex: 1; padding: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--muted);
    font-family: 'Nunito', sans-serif;
    font-size: 14px; font-weight: 800;
    cursor: pointer;
  }
  .btn-danger {
    flex: 1; padding: 12px;
    background: rgba(248,113,113,0.15);
    border: 1px solid rgba(248,113,113,0.3);
    border-radius: var(--radius-sm);
    color: #f87171;
    font-family: 'Nunito', sans-serif;
    font-size: 14px; font-weight: 800;
    cursor: pointer;
  }

  /* ── Busca ── */
  .search-wrap {
    padding: 10px 16px 0;
    flex-shrink: 0;
  }
  .search-box {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 99px;
    padding: 8px 14px;
    transition: border-color .2s;
  }
  .search-box:focus-within { border-color: var(--accent); }
  .search-icon { font-size: 15px; flex-shrink: 0; }
  .search-input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 14px;
    font-weight: 600;
  }
  .search-input::placeholder { color: var(--faint); }
  .search-clear {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 16px;
    cursor: pointer;
    padding: 0;
    line-height: 1;
    display: none;
  }
  .search-clear.show { display: block; }

  /* ── Botão editar no item ── */
  .btn-edit-item {
    background: none;
    border: none;
    color: var(--faint);
    font-size: 15px;
    cursor: pointer;
    padding: 4px;
    border-radius: 6px;
    transition: color .15s;
    flex-shrink: 0;
    line-height: 1;
  }
  .btn-edit-item:active { color: var(--accent); }

  /* ── Confete ── */
  .confetti-wrap {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 999;
    overflow: hidden;
  }
  .confetti-piece {
    position: absolute;
    width: 10px;
    height: 10px;
    border-radius: 2px;
    top: -20px;
    animation: confettiFall linear forwards;
  }
  @keyframes confettiFall {
    0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
    80%  { opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { transition: none !important; animation: none !important; }
  }
</style>
</head>
<body>

<div id="app">
  <div class="header">
    <div class="header-top">
      <div>
        <div class="header-title">Minhas <span>compras</span> 🛒</div>
        <div class="header-sub" id="subtitle">carregando...</div>
      </div>
      <button class="btn-clear" id="btnClear" title="Limpar marcados">🧹</button>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  </div>

  <div class="filters" id="filters"></div>

  <div class="search-wrap">
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input class="search-input" id="searchInput" type="text" placeholder="Buscar item...">
      <button class="search-clear" id="searchClear">✕</button>
    </div>
  </div>

  <div class="toggle-row">
    <span class="toggle-label">Ocultar marcados</span>
    <div class="toggle" id="toggleHide"></div>
  </div>

  <div class="list-scroll" id="listScroll"></div>

  <button class="fab" id="fab">+</button>
</div>

<!-- Overlay + sheet -->
<div class="overlay" id="overlay"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title" id="sheetTitle">Novo item</div>

  <div class="field-label">Nome do produto</div>
  <input class="input" id="inputName" type="text" placeholder="ex: Leite integral, Sabão em pó...">

  <div class="field-label">Quantidade</div>
  <div class="qty-row">
    <button class="qty-btn" id="qtyMinus">−</button>
    <div class="qty-num" id="qtyNum">1</div>
    <button class="qty-btn" id="qtyPlus">+</button>
  </div>

  <div class="field-label">Categoria</div>
  <div class="cat-grid" id="catGrid"></div>

  <button class="btn-add" id="btnSave">Adicionar ✓</button>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Confete -->
<div class="confetti-wrap" id="confettiWrap"></div>

<!-- Confirm -->
<div class="confirm" id="confirmDialog">
  <div class="confirm-box">
    <div class="confirm-title">Limpar lista?</div>
    <div class="confirm-sub">Todos os itens marcados como comprados serão removidos.</div>
    <div class="confirm-actions">
      <button class="btn-cancel" id="confirmCancel">Cancelar</button>
      <button class="btn-danger" id="confirmOk">Limpar</button>
    </div>
  </div>
</div>

<script>
// ── Categorias ──────────────────────────────────────────────────────────────
const CATS = [
  { id: 'frutas',     label: 'Frutas',     icon: '🍎', color: '#4ade80' },
  { id: 'verduras',   label: 'Verduras',   icon: '🥬', color: '#a3e635' },
  { id: 'carnes',     label: 'Carnes',     icon: '🥩', color: '#f87171' },
  { id: 'laticinios', label: 'Laticínios', icon: '🥛', color: '#60a5fa' },
  { id: 'mercearia',  label: 'Mercearia',  icon: '🌾', color: '#f59e0b' },
  { id: 'limpeza',    label: 'Limpeza',    icon: '🧹', color: '#c084fc' },
  { id: 'higiene',    label: 'Higiene',    icon: '🧴', color: '#34d399' },
  { id: 'bebidas',    label: 'Bebidas',    icon: '🧃', color: '#fbbf24' },
  { id: 'padaria',    label: 'Padaria',    icon: '🍞', color: '#fb923c' },
  { id: 'outros',     label: 'Outros',     icon: '🛍️', color: '#94a3b8' },
];
const catMap = Object.fromEntries(CATS.map(c => [c.id, c]));
const hex2rgba = (hex, a) => {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
};

// ── IndexedDB ───────────────────────────────────────────────────────────────
let db;
function openDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open('compras_db', 2);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('items')) {
        const store = d.createObjectStore('items', { keyPath: 'id', autoIncrement: true });
        store.createIndex('category', 'category', { unique: false });
      }
    };
    req.onsuccess = e => { db = e.target.result; res(db); };
    req.onerror = () => rej(req.error);
  });
}
function dbGetAll() {
  return new Promise((res, rej) => {
    const tx = db.transaction('items', 'readonly');
    const req = tx.objectStore('items').getAll();
    req.onsuccess = () => res(req.result);
    req.onerror = () => rej(req.error);
  });
}
function dbAdd(item) {
  return new Promise((res, rej) => {
    const tx = db.transaction('items', 'readwrite');
    const req = tx.objectStore('items').add(item);
    req.onsuccess = () => res(req.result);
    req.onerror = () => rej(req.error);
  });
}
function dbPut(item) {
  return new Promise((res, rej) => {
    const tx = db.transaction('items', 'readwrite');
    const req = tx.objectStore('items').put(item);
    req.onsuccess = () => res();
    req.onerror = () => rej(req.error);
  });
}
function dbDelete(id) {
  return new Promise((res, rej) => {
    const tx = db.transaction('items', 'readwrite');
    const req = tx.objectStore('items').delete(id);
    req.onsuccess = () => res();
    req.onerror = () => rej(req.error);
  });
}

// ── State ───────────────────────────────────────────────────────────────────
let items = [];
let filterCat = null;
let hideChecked = false;
let searchQuery = '';
let editingId = null;
let sheetQty = 1;
let sheetCat = 'outros';
let lastPendingCount = -1;

// ── Render ──────────────────────────────────────────────────────────────────
function render() {
  const pending = items.filter(i => !i.checked).length;
  const total = items.length;
  const pct = total === 0 ? 0 : Math.round(((total - pending) / total) * 100);

  document.getElementById('subtitle').textContent =
    total === 0 ? 'sua lista está vazia' :
    pending === 0 ? '🎉 tudo comprado!' :
    `${pending} de ${total} itens pendentes`;
  document.getElementById('progressFill').style.width = pct + '%';

  if (total > 0 && pending === 0 && lastPendingCount > 0) launchConfetti();
  lastPendingCount = pending;

  renderFilters();
  renderList();
}

function renderFilters() {
  const el = document.getElementById('filters');
  const counts = {};
  items.filter(i => !i.checked).forEach(i => {
    counts[i.category] = (counts[i.category] || 0) + 1;
  });

  let html = `<div class="chip ${filterCat === null ? 'active' : ''}" data-cat="" style="--active-color:#a78bfa;--active-bg:rgba(167,139,250,0.15)">
    <span class="chip-icon">🛒</span> Todas
  </div>`;

  CATS.forEach(cat => {
    const c = counts[cat.id] || 0;
    const active = filterCat === cat.id;
    html += `<div class="chip ${active ? 'active' : ''}" data-cat="${cat.id}"
      style="--active-color:${cat.color};--active-bg:${hex2rgba(cat.color,0.12)}">
      <span class="chip-icon">${cat.icon}</span>${cat.label}${c > 0 ? ` <strong>${c}</strong>` : ''}
    </div>`;
  });
  el.innerHTML = html;
  el.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () => {
      const val = chip.dataset.cat;
      filterCat = val === '' ? null : val;
      render();
    });
  });
}

function renderList() {
  const scroll = document.getElementById('listScroll');
  const q = searchQuery.trim().toLowerCase();
  let visible = items.filter(item => {
    if (filterCat && item.category !== filterCat) return false;
    if (hideChecked && item.checked) return false;
    if (q && !item.name.toLowerCase().includes(q)) return false;
    return true;
  });

  if (visible.length === 0) {
    if (items.length === 0) {
      scroll.innerHTML = `<div class="empty">
        <div class="empty-emoji">🛒</div>
        <div class="empty-title">Lista vazia!</div>
        <div class="empty-sub">Toque no + para adicionar<br>seus primeiros itens</div>
      </div>`;
    } else {
      scroll.innerHTML = `<div class="empty">
        <div class="empty-emoji">🔍</div>
        <div class="empty-title">Nenhum item aqui</div>
        <div class="empty-sub">Mude o filtro ou desative<br>"Ocultar marcados"</div>
      </div>`;
    }
    return;
  }

  // Agrupa por categoria
  const groups = {};
  CATS.forEach(c => { groups[c.id] = []; });
  visible.forEach(item => {
    if (!groups[item.category]) groups[item.category] = [];
    groups[item.category].push(item);
  });

  let html = '';
  CATS.forEach(cat => {
    const list = groups[cat.id];
    if (!list || list.length === 0) return;
    list.sort((a, b) => a.checked - b.checked);
    const pendingCat = list.filter(i => !i.checked).length;
    const bg = hex2rgba(cat.color, 0.12);
    const bgBadge = hex2rgba(cat.color, 0.15);

    html += `<div class="cat-header">
      <div class="cat-icon-wrap" style="background:${bg}">${cat.icon}</div>
      <div class="cat-name" style="color:${cat.color}">${cat.label}</div>
      <div class="cat-badge" style="background:${bgBadge};color:${cat.color}">${pendingCat}/${list.length}</div>
    </div>`;

    list.forEach(item => {
      const checkedCls = item.checked ? 'checked' : '';
      const checkContent = item.checked
        ? `<span style="color:${cat.color}">✓</span>`
        : '';
      const checkStyle = item.checked
        ? `background:${hex2rgba(cat.color,0.15)};border-color:${cat.color}`
        : '';
      html += `<div class="item ${checkedCls}" data-id="${item.id}">
        <div class="item-delete-bg">🗑️</div>
        <div class="checkbox" style="${checkStyle}">${checkContent}</div>
        <div class="item-body">
          <div class="item-name">${escHtml(item.name)}</div>
          ${item.qty > 1 ? `<div class="item-qty">${item.qty} unidades</div>` : ''}
        </div>
        <button class="btn-edit-item" data-edit="${item.id}" title="Editar">✏️</button>
        <div class="item-cat-dot" style="background:${cat.color}"></div>
      </div>`;
    });
  });

  scroll.innerHTML = html;

  // Eventos dos itens
  scroll.querySelectorAll('.item').forEach(el => {
    const id = Number(el.dataset.id);

    // Tap no item = toggle check (ignora clique no botão editar)
    el.addEventListener('click', e => {
      if (e.target.closest('.btn-edit-item')) return;
      toggleItem(id);
    });

    // Botão editar visível
    const editBtn = el.querySelector('.btn-edit-item');
    if (editBtn) {
      editBtn.addEventListener('click', e => {
        e.stopPropagation();
        openEdit(id);
      });
    }

    // Long press = editar (fallback)
    let pressTimer;
    el.addEventListener('pointerdown', e => {
      if (e.target.closest('.btn-edit-item')) return;
      pressTimer = setTimeout(() => openEdit(id), 500);
    });
    el.addEventListener('pointerup', () => clearTimeout(pressTimer));
    el.addEventListener('pointercancel', () => clearTimeout(pressTimer));

    // Swipe esquerda = deletar
    let startX = 0, currentX = 0, swiping = false;
    el.addEventListener('touchstart', e => {
      startX = e.touches[0].clientX;
      swiping = false;
    }, { passive: true });
    el.addEventListener('touchmove', e => {
      currentX = e.touches[0].clientX;
      const dx = currentX - startX;
      if (dx < -10) {
        swiping = true;
        el.classList.add('swiping');
        const move = Math.max(dx, -80);
        el.style.transform = `translateX(${move}px)`;
        const bg = el.querySelector('.item-delete-bg');
        bg.style.opacity = Math.min((-dx) / 80, 1);
      }
    }, { passive: true });
    el.addEventListener('touchend', () => {
      el.classList.remove('swiping');
      if (swiping && (currentX - startX) < -60) {
        el.style.transform = 'translateX(-100%)';
        el.style.opacity = '0';
        el.style.transition = 'all .25s';
        setTimeout(() => deleteItem(id), 200);
      } else {
        el.style.transform = '';
        el.style.transition = '';
        const bg = el.querySelector('.item-delete-bg');
        if (bg) bg.style.opacity = '0';
      }
    });
  });
}

// ── Actions ─────────────────────────────────────────────────────────────────
async function toggleItem(id) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  item.checked = !item.checked;
  await dbPut(item);
  render();
}

async function deleteItem(id) {
  items = items.filter(i => i.id !== id);
  await dbDelete(id);
  render();
  showToast('Item removido 🗑️');
}

async function clearChecked() {
  const toRemove = items.filter(i => i.checked).map(i => i.id);
  for (const id of toRemove) await dbDelete(id);
  items = items.filter(i => !i.checked);
  render();
  showToast(`${toRemove.length} itens removidos ✓`);
}

// ── Sheet ────────────────────────────────────────────────────────────────────
function buildCatGrid() {
  const grid = document.getElementById('catGrid');
  grid.innerHTML = CATS.map(cat => `
    <div class="cat-btn ${sheetCat === cat.id ? 'selected' : ''}" data-cat="${cat.id}"
      style="--sel-color:${cat.color};--sel-bg:${hex2rgba(cat.color,0.12)}">
      <div class="cat-btn-icon">${cat.icon}</div>
      <div class="cat-btn-label">${cat.label}</div>
    </div>
  `).join('');
  grid.querySelectorAll('.cat-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      sheetCat = btn.dataset.cat;
      buildCatGrid();
    });
  });
}

function openSheet() {
  editingId = null;
  sheetQty = 1;
  sheetCat = 'outros';
  document.getElementById('sheetTitle').textContent = 'Novo item ✨';
  document.getElementById('inputName').value = '';
  document.getElementById('qtyNum').textContent = '1';
  document.getElementById('btnSave').textContent = 'Adicionar ✓';
  buildCatGrid();
  document.getElementById('overlay').classList.add('show');
  document.getElementById('sheet').classList.add('show');
  setTimeout(() => document.getElementById('inputName').focus(), 300);
}

function openEdit(id) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  editingId = id;
  sheetQty = item.qty;
  sheetCat = item.category;
  document.getElementById('sheetTitle').textContent = 'Editar item ✏️';
  document.getElementById('inputName').value = item.name;
  document.getElementById('qtyNum').textContent = sheetQty;
  document.getElementById('btnSave').textContent = 'Salvar ✓';
  buildCatGrid();
  document.getElementById('overlay').classList.add('show');
  document.getElementById('sheet').classList.add('show');
}

function closeSheet() {
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('sheet').classList.remove('show');
  document.getElementById('inputName').blur();
}

async function saveItem() {
  const name = document.getElementById('inputName').value.trim();
  if (!name) {
    document.getElementById('inputName').focus();
    document.getElementById('inputName').style.borderColor = '#f87171';
    setTimeout(() => document.getElementById('inputName').style.borderColor = '', 1000);
    return;
  }
  if (editingId !== null) {
    const item = items.find(i => i.id === editingId);
    item.name = name;
    item.qty = sheetQty;
    item.category = sheetCat;
    await dbPut(item);
    showToast('Item atualizado ✓');
  } else {
    const newItem = { name, qty: sheetQty, category: sheetCat, checked: false };
    const id = await dbAdd(newItem);
    newItem.id = id;
    items.push(newItem);
    showToast('Item adicionado 🎉');
  }
  closeSheet();
  render();
}

// ── Toast ────────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

// ── Escape HTML ──────────────────────────────────────────────────────────────
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Confete ──────────────────────────────────────────────────────────────────
function launchConfetti() {
  const wrap = document.getElementById('confettiWrap');
  const colors = ['#a78bfa','#4ade80','#f87171','#60a5fa','#fbbf24','#fb923c','#34d399','#f0abfc'];
  wrap.innerHTML = '';
  for (let i = 0; i < 80; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.left = Math.random() * 100 + 'vw';
    p.style.background = colors[Math.floor(Math.random() * colors.length)];
    p.style.width = (8 + Math.random() * 8) + 'px';
    p.style.height = (8 + Math.random() * 8) + 'px';
    p.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    p.style.animationDuration = (1.5 + Math.random() * 2) + 's';
    p.style.animationDelay = (Math.random() * 0.8) + 's';
    wrap.appendChild(p);
  }
  showToast('🎉 Tudo comprado! Arrasou!');
  setTimeout(() => { wrap.innerHTML = ''; }, 4000);
}

// ── Eventos ──────────────────────────────────────────────────────────────────
document.getElementById('fab').addEventListener('click', openSheet);
document.getElementById('overlay').addEventListener('click', closeSheet);

const searchInput = document.getElementById('searchInput');
const searchClear = document.getElementById('searchClear');
searchInput.addEventListener('input', () => {
  searchQuery = searchInput.value;
  searchClear.classList.toggle('show', searchQuery.length > 0);
  render();
});
searchClear.addEventListener('click', () => {
  searchQuery = '';
  searchInput.value = '';
  searchClear.classList.remove('show');
  render();
});

document.getElementById('qtyMinus').addEventListener('click', () => {
  if (sheetQty > 1) { sheetQty--; document.getElementById('qtyNum').textContent = sheetQty; }
});
document.getElementById('qtyPlus').addEventListener('click', () => {
  sheetQty++; document.getElementById('qtyNum').textContent = sheetQty;
});

document.getElementById('inputName').addEventListener('keydown', e => {
  if (e.key === 'Enter') saveItem();
});
document.getElementById('btnSave').addEventListener('click', saveItem);

document.getElementById('toggleHide').addEventListener('click', function() {
  hideChecked = !hideChecked;
  this.classList.toggle('on', hideChecked);
  render();
});

document.getElementById('btnClear').addEventListener('click', () => {
  const checked = items.filter(i => i.checked);
  if (checked.length === 0) { showToast('Nenhum item marcado'); return; }
  document.getElementById('confirmDialog').classList.add('show');
});
document.getElementById('confirmCancel').addEventListener('click', () => {
  document.getElementById('confirmDialog').classList.remove('show');
});
document.getElementById('confirmOk').addEventListener('click', () => {
  document.getElementById('confirmDialog').classList.remove('show');
  clearChecked();
});

// ── Init ──────────────────────────────────────────────────────────────────────
openDB().then(async () => {
  items = await dbGetAll();
  render();
});

// ── Service Worker ────────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
